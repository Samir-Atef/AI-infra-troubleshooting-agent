global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "infra-agent"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["agent-api:8000"]
        labels:
          service: "infra-troubleshooting-agent"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
