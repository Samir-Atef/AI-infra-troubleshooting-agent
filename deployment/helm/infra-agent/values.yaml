# Default values for infra-troubleshooting-agent

replicaCount: 2

image:
  repository: infra-troubleshooting-agent
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: "infra-agent"

rbac:
  create: true

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: infra-agent.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Application configuration
config:
  llmProvider: "openai"
  llmModel: "gpt-4"
  llmBaseUrl: "http://llm-serving:8080/v1"
  llmTemperature: "0.1"
  llmMaxTokens: "4096"
  k8sInCluster: "true"
  k8sDefaultNamespace: "default"
  prometheusUrl: "http://prometheus-server.monitoring:9090"
  prometheusTimeout: "30"
  vectorDbType: "chroma"
  chromaPersistDir: "/data/chroma"
  chromaCollectionName: "k8s_knowledge"
  logLevel: "INFO"
  logFormat: "json"
  metricsEnabled: "true"
  enableRbac: "true"

# Secrets
secrets:
  llmApiKey: "changeme"

# Persistence for vector database
persistence:
  enabled: true
  storageClassName: standard
  accessMode: ReadWriteOnce
  size: 5Gi

# Pod configuration
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 30

nodeSelector: {}
tolerations: []
affinity: {}
