apiVersion: v1
kind: Service
metadata:
  name: {{ include "infra-agent.fullname" . }}
  labels:
    {{- include "infra-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "infra-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
