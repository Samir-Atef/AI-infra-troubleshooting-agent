apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-agent
  namespace: infra-agent
  labels:
    app.kubernetes.io/name: infra-troubleshooting-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infra-agent-reader
  labels:
    app.kubernetes.io/name: infra-troubleshooting-agent
rules:
  # Read-only access to core resources
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - events
      - configmaps
      - nodes
      - namespaces
      - persistentvolumeclaims
      - persistentvolumes
    verbs: ["get", "list", "watch"]
  # Read-only access to apps resources
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  # Read-only access to networking
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  # Read-only access to autoscaling
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  # Read-only access to batch
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infra-agent-reader-binding
  labels:
    app.kubernetes.io/name: infra-troubleshooting-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: infra-agent-reader
subjects:
  - kind: ServiceAccount
    name: infra-agent
    namespace: infra-agent
