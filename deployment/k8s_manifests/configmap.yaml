apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-agent-config
  namespace: infra-agent
  labels:
    app.kubernetes.io/name: infra-troubleshooting-agent
    app.kubernetes.io/component: api
data:
  AGENT_APP_NAME: "AI Infrastructure Troubleshooting Agent"
  AGENT_API_HOST: "0.0.0.0"
  AGENT_API_PORT: "8000"
  AGENT_LLM_PROVIDER: "openai"
  AGENT_LLM_MODEL: "gpt-4"
  AGENT_LLM_BASE_URL: "http://llm-serving:8080/v1"
  AGENT_LLM_TEMPERATURE: "0.1"
  AGENT_LLM_MAX_TOKENS: "4096"
  AGENT_K8S_IN_CLUSTER: "true"
  AGENT_K8S_DEFAULT_NAMESPACE: "default"
  AGENT_PROMETHEUS_URL: "http://prometheus-server.monitoring:9090"
  AGENT_PROMETHEUS_TIMEOUT: "30"
  AGENT_VECTOR_DB_TYPE: "chroma"
  AGENT_CHROMA_PERSIST_DIR: "/data/chroma"
  AGENT_CHROMA_COLLECTION_NAME: "k8s_knowledge"
  AGENT_LOG_LEVEL: "INFO"
  AGENT_LOG_FORMAT: "json"
  AGENT_METRICS_ENABLED: "true"
  AGENT_ENABLE_RBAC: "true"
